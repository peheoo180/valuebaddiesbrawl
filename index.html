<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baddies Brawl Value 🌸</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #8a99b1;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-red: #ff2d55;
            --gold: #ffd700;
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- OVERLAY THÔNG BÁO --- */
        #warningOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 9999;
            display: none; flex-direction: column; padding: 20px; box-sizing: border-box;
        }

        .warn-card {
            background: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 15px; padding: 15px; margin-bottom: 15px;
        }

        .warn-title { color: var(--accent-red); font-weight: 800; display: block; margin-bottom: 8px; }
        .note-title { color: var(--gold); font-weight: 800; display: block; margin-bottom: 8px; }
        .warn-text { font-size: 13px; line-height: 1.5; color: #fff; }

        .btn-box { display: flex; justify-content: flex-end; margin-top: 10px; }
        .btn-go {
            background: linear-gradient(45deg, #ff2d55, #561c94);
            color: white; border: none; padding: 10px 25px;
            border-radius: 50px; font-weight: 700; cursor: pointer;
        }

        /* --- GIAO DIỆN CHÍNH --- */
        .header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 24, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 { 
            font-size: 18px; margin: 0; font-weight: 800; 
            background: linear-gradient(to right, #ff2d55, #561c94, #00d2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow-text 3s linear infinite;
        }

        .search-container { padding: 20px 20px 10px; }
        #searchInput {
            width: 100%; padding: 14px 15px; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 12px;
            color: white; outline: none; box-sizing: border-box;
        }

        .filter-container {
            display: flex; gap: 10px; padding: 10px 20px;
            overflow-x: auto; white-space: nowrap; scrollbar-width: none;
        }
        .filter-container::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: var(--card-bg); border: 1px solid var(--border-color);
            color: var(--text-sub); padding: 8px 18px; border-radius: 50px;
            font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .filter-btn.active {
            background: var(--accent-purple); color: white;
            border-color: #a855f7; box-shadow: 0 0 15px rgba(86, 28, 148, 0.4);
        }

        .all-items-title { padding: 15px 20px 10px; font-size: 18px; font-weight: 700; color: #ffffff; }

        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 0 15px 30px;
        }

        .item-card { 
            background: var(--card-bg); border-radius: 18px; overflow: hidden; 
            border: 1px solid var(--border-color); transition: 0.3s ease;
        }

        /* --- HIỆU ỨNG RAINBOW NỀN CHO TẤT CẢ --- */
        .image-box { 
            width: 100%; aspect-ratio: 1.2 / 1; 
            /* Nền cầu vồng 7 màu chạy thẳng */
            background: linear-gradient(
                45deg, 
                #ff0000, #ff7300, #fffb00, #48ff00, 
                #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000
            );
            background-size: 400% 400%;
            animation: rainbow-bg 10s linear infinite;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }

        .image-box img { 
            width: 80%; height: 80%; object-fit: contain; 
            z-index: 2;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6)); 
        }
        
        .info-box { padding: 12px; }
        .tag { background: rgba(0, 0, 0, 0.3); color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 6px; text-transform: uppercase; font-weight: 700; }
        .item-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-value span { color: var(--gold); font-weight: 800; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .item-old { font-size: 11px; color: #ff4d4d; font-weight: 700; }

        /* ĐỘ HIẾM VIỀN TỰ ĐỘNG THEO VALUE */
        .rarity-legendary { border: 2px solid var(--gold) !important; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
        .rarity-epic { border: 2px solid #a855f7 !important; }
        .rarity-rare { border: 2px solid #3b82f6 !important; }

        #backToTop {
            position: fixed; bottom: 25px; right: 20px;
            width: 45px; height: 45px; background: var(--accent-purple);
            color: white; border: none; border-radius: 50%;
            display: none; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 998;
        }

        /* --- KEYFRAMES --- */
        @keyframes rainbow-text { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        
        @keyframes rainbow-bg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div id="warningOverlay">
        <div style="flex-grow: 1; overflow-y: auto;">
            <div class="warn-card">
                <span class="warn-title">❗ Cảnh báo giả mạo</span>
                <div class="warn-text">Website này chỉ cung cấp giá trị tham khảo.</div>
            </div>
        </div>
        <div class="btn-box"><button class="btn-go" onclick="enterWeb()">Tôi đã hiểu</button></div>
    </div>

    <div id="mainContent">
        <div class="header"><h1>BADDIES BRAWL VALUE 🌸</h1><div>☰</div></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm tên vật phẩm..." onkeyup="filterItems()">
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="setFilter('All', this)">All Items</button>
            <button class="filter-btn" onclick="setFilter('Style', this)">Style</button>
            <button class="filter-btn" onclick="setFilter('Skin', this)">Skin</button>
            <button class="filter-btn" onclick="setFilter('Aura', this)">Aura</button>
        </div>
        
        <div class="all-items-title" id="listTitle">All Items</div>

        <div class="grid-container" id="itemGrid">
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938958892105739/5d9d7c932f69c220afd5b248c74ba066.png?ex=69f2fb30&is=69f1a9b0&hm=89d89a2f486a8686791b0114d16a01431cf78808f110258e417e657b8f72708a&"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Monkey Style</div><div class="item-value">Value: <span>8.500</span></div><div class="item-old">Old: -</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938931008507974/66c6629cb38610dd030654bcb36dced8.png?ex=69f2fb2a&is=69f1a9aa&hm=ba6c6eeb6489ab3eea9d936cccf9e94435d1bc9bf05677c108286eb410fe577b&"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Princess style</div><div class="item-value">Value: <span>11.000</span></div><div class="item-old">Old: 9.700</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1499015546639745074/1777463502312.png?ex=69f34284&is=69f1f104&hm=fd4dff209001a03e566dc0ea5962624d80ee43fde41fe9f5f0c3cacb362c8fa4&"></div><div class="info-box"><span class="tag">Aura</span><div class="item-name">Bat</div><div class="item-value">Value: <span>50.000</span></div><div class="item-old">Old: -</div></div></div>
            </div>
    </div>

    <button id="backToTop" onclick="scrollToTop()">↑</button>

    <script>
        let currentCategory = 'All';

        window.onload = function() {
            if (!sessionStorage.getItem('warningShown')) {
                document.getElementById('warningOverlay').style.display = 'flex';
            } else {
                logicJumping();
            }
            applyRarity();
        };

        function enterWeb() {
            document.getElementById('warningOverlay').style.display = 'none';
            sessionStorage.setItem('warningShown', 'true');
            logicJumping();
        }

        // Vẫn giữ độ hiếm ở VIỀN để phân biệt giá trị, còn NỀN thì cầu vồng hết
        function applyRarity() {
            const cards = document.querySelectorAll('.item-card');
            cards.forEach(card => {
                const valText = card.querySelector('.item-value span').innerText.replace(/\./g, '');
                const val = parseInt(valText);
                card.classList.remove('rarity-legendary', 'rarity-epic', 'rarity-rare');
                if (val >= 40000) card.classList.add('rarity-legendary');
                else if (val >= 15000) card.classList.add('rarity-epic');
                else if (val >= 5000) card.classList.add('rarity-rare');
            });
        }

        function setFilter(cat, btn) {
            currentCategory = cat;
            let buttons = document.getElementsByClassName('filter-btn');
            for(let b of buttons) b.classList.remove('active');
            btn.classList.add('active');
            document.getElementById('listTitle').innerText = cat === 'All' ? 'All Items' : cat + 's';
            filterItems();
        }

        function filterItems() {
            let searchInput = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('item-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector('.item-name').innerText.toLowerCase();
                let tag = cards[i].querySelector('.tag').innerText;
                let matchesSearch = name.includes(searchInput);
                let matchesCategory = (currentCategory === 'All' || tag === currentCategory);
                cards[i].style.display = (matchesSearch && matchesCategory) ? "block" : "none";
            }
        }

        window.onscroll = function() {
            let btn = document.getElementById("backToTop");
            if (document.body.scrollTop > 400 || document.documentElement.scrollTop > 400) btn.style.display = "flex";
            else btn.style.display = "none";
        };

        function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }

        function logicJumping() {
            const now = new Date().getTime();
            const lastUpdate = localStorage.getItem('lastUpdate');
            const updateInterval = 30 * 60 * 1000;
            const cards = document.querySelectorAll('.item-card');
            
            const savedData = JSON.parse(localStorage.getItem('baddiesValues'));
            if (savedData) {
                cards.forEach((card, i) => {
                    if(savedData[i]) {
                        card.querySelector('.item-value span').innerText = savedData[i].v;
                        card.querySelector('.item-old').innerText = "Old: " + savedData[i].o;
                    }
                });
            }

            if (lastUpdate && (now - lastUpdate < updateInterval)) {
                applyRarity();
                return;
            }

            const newData = [];
            cards.forEach((card) => {
                let valSpan = card.querySelector('.item-value span');
                let oldDiv = card.querySelector('.item-old');
                let curVal = parseInt(valSpan.innerText.replace(/\./g, ''));

                if (Math.random() > 0.8) {
                    let oldV = curVal;
                    let change = Math.floor(curVal * (Math.random() * 0.05 + 0.01));
                    curVal = Math.random() > 0.5 ? curVal + change : curVal - change;
                    let curS = curVal.toLocaleString('vi-VN');
                    let oldS = oldV.toLocaleString('vi-VN');
                    valSpan.innerText = curS;
                    oldDiv.innerText = "Old: " + oldS;
                    newData.push({ v: curS, o: oldS });
                } else {
                    newData.push({ v: valSpan.innerText, o: oldDiv.innerText.replace("Old: ", "") });
                }
            });
            localStorage.setItem('baddiesValues', JSON.stringify(newData));
            localStorage.setItem('lastUpdate', now);
            applyRarity();
        }
    </script>
</body>
</html>
