<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baddies Brawl Value 🌸</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #8a99b1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        html, body {
            background-color: var(--bg-dark); color: var(--text-main);
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden; scroll-behavior: smooth;
        }

        .header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 24, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-color);
        }

        .header h1 { 
            font-size: 18px; margin: 0; font-weight: 800; 
            background: linear-gradient(to right, #ff2d55, #561c94, #00d2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow-text 3s linear infinite;
        }

        .search-container { padding: 20px 20px 10px; }
        #searchInput {
            width: 100%; padding: 12px 15px; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 12px;
            color: white; outline: none; box-sizing: border-box;
        }

        .section-title { padding: 10px 20px 15px; }
        .grid-container {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 0 15px 30px;
        }

        .item-card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--border-color); }
        .image-box {
            width: 100%; aspect-ratio: 1.2 / 1;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient-bg 5s ease infinite;
            display: flex; justify-content: center; align-items: center;
        }

        .image-box img { width: 85%; height: 85%; object-fit: contain; }
        .info-box { padding: 12px; }
        .tag { background: rgba(255, 255, 255, 0.08); color: var(--text-sub); font-size: 9px; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
        .item-name { font-size: 14px; font-weight: 700; color: #fff; margin: 4px 0; }
        .item-value { font-size: 12px; color: var(--text-sub); }
        .item-value span { color: #ffd700; font-weight: 600; transition: color 0.5s; }
        .item-old { font-size: 11px; color: #ff2d55; margin-top: 2px; }

        @keyframes gradient-bg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes rainbow-text { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>BADDIES BRAWL VALUE 🌸</h1>
        <div style="color: white;">☰</div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Tìm tên vật phẩm..." onkeyup="searchItem()">
    </div>

    <div class="section-title"><h2>All Items</h2></div>
    <div class="grid-container" id="itemGrid"></div>

    <script>
        const items = [
            { name: "Monkey Style", tag: "Style", value: 8500, old: "-", img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498938958892105739/5d9d7c932f69c220afd5b248c74ba066.png?ex=69f2fb30&is=69f1a9b0&hm=89d89a2f486a8686791b0114d16a01431cf78808f110258e417e657b8f72708a&" },
            { name: "Princess style", tag: "Style", value: 11000, old: 9700, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498938931008507974/66c6629cb38610dd030654bcb36dced8.png?ex=69f2fb2a&is=69f1a9aa&hm=ba6c6eeb6489ab3eea9d936cccf9e94435d1bc9bf05677c108286eb410fe577b&" },
            { name: "EggRose", tag: "Skin", value: 9820, old: 6340, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498943124041629747/b01999b81cc4701dd38d4ba51a8ffc52_1.png?ex=69f2ff11&is=69f1ad91&hm=88f719d473f495e275495275dc73c57aefd328b7ebec03136011f74838e79313&" },
            { name: "Arctic", tag: "Skin", value: 44560, old: 26710, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498947310871122022/b01999b81cc4701dd38d4ba51a8ffc52.png?ex=69f302f8&is=69f1b178&hm=e5f52ae702093b1b377dd223d07755885a38e0b10e01adbfe39d35f93df9b2f1&" },
            { name: "Celestial Wings", tag: "Aura", value: 15600, old: "-", img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498948672115707914/2b23f0abfb9b978248d01cd669837058.png?ex=69f3043c&is=69f1b2bc&hm=1bb72f2b07570784ece784ca4ba3df61e2a5700dbf4c2ec60341c7f9c060461b&" },
            { name: "LipSmash", tag: "Aura", value: 4850, old: 257, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498951637841215518/e5520dc6533b59136756a2eaa58f472b.png?ex=69f306ff&is=69f1b57f&hm=afdccfea68d60824622f018750854f6807bac29f3e2bbe735754769709e0054b&" },
            { name: "Bonk Style", tag: "Style", value: 600, old: 1700, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498960008392605767/9a223c3b0772c2c0dceba6be69072734_2.png?ex=69f30ecb&is=69f1bd4b&hm=e061385f113c9c0cad864ed2e3b34a7d26b0269d6f59fa7c0166b4e606e256ec&" },
            { name: "Elf Style", tag: "Style", value: 3653, old: 4500, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498961414977749083/9a223c3b0772c2c0dceba6be69072734.png?ex=69f3101a&is=69f1be9a&hm=39a3403922e1880bcd1cc8086c1f011cac189df6eb8b33ce73894f0c01b8817f&" },
            { name: "Blood Reaver", tag: "Skin", value: 4500, old: 3123, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498966867266764841/1f5c9c97731f782b83f50d535b1d628c.png?ex=69f3152e&is=69f1c3ae&hm=f3f419866be95e9b0a3e8e839cca01e7e891117de952c02ae3b860b6136dc03f&" },
            { name: "Icebreaker Style", tag: "Style", value: 6000, old: 5800, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498968743701774386/d352bcae62ef926c07436716ca738917.png?ex=69f316ed&is=69f1c56d&hm=de2d7c0d284ed8f7d1bdb3ca4c4f828b64956c13418f0abe7027a992754d24d5&" },
            { name: "Spiderlord", tag: "Skin", value: 7885, old: 8400, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1499030884148580492/1777467145852.png?ex=69f350cd&is=69f1ff4d&hm=2d72400490d91e649058440284a87cc8392922dfb47f0c2b22c180dbf2876f39&" },
            { name: "Omen", tag: "Skin", value: 10900, old: 7000, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1498980835850719332/8cdfc5dbcee53d8094bae03297c4d4e6.png?ex=69f32230&is=69f1d0b0&hm=1f3d6bd133119f1bf0deea8a2d2c641a07932b4d6c25e3156786ce30edb781a0&" },
            { name: "Bat", tag: "Aura", value: 50000, old: "-", img: "https://cdn.discordapp.com/attachments/1498938855171031142/1499015546639745074/1777463502312.png?ex=69f34284&is=69f1f104&hm=fd4dff209001a03e566dc0ea5962624d80ee43fde41fe9f5f0c3cacb362c8fa4&" },
            { name: "Witch Style", tag: "Style", value: 20000, old: 14500, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1499017073832100011/e3975e9e1f49870cc17111d5fa93f719_2.png?ex=69f343f0&is=69f1f270&hm=351efe4316d360f3c19e86417760ccb989cb566200bb8b6ebe5c9acd168bbd6e&" },
            { name: "Zombie Style", tag: "Style", value: 13000, old: 9980, img: "https://cdn.discordapp.com/attachments/1498938855171031142/1499177426880692306/e3975e9e1f49870cc17111d5fa93f719.png?ex=69f3d947&is=69f287c7&hm=8632c9c4df371827e01387f1de6e8f29aac08f215786c0723f1b14aa1f954047&" },
            { name: "Ghost", tag: "Skin", value: 17000, old: "-", img: "https://cdn.discordapp.com/attachments/1498938855171031142/1499177387101913138/7e891b57300ffb2641afabba87474283.png?ex=69f3d93e&is=69f287be&hm=58399fec650887b09d24832ecab659b5361ad6ecd0f1bf0a4b5fccdabfc4075c&" }
        ];

        const grid = document.getElementById('itemGrid');
        function renderItems() {
            grid.innerHTML = items.map(item => `
                <div class="item-card">
                    <div class="image-box"><img src="${item.img}"></div>
                    <div class="info-box">
                        <span class="tag">${item.tag}</span>
                        <div class="item-name">${item.name}</div>
                        <div class="item-value">Value: <span>${item.value.toLocaleString('vi-VN')}</span></div>
                        <div class="item-old">Old: ${item.old === "-" ? "-" : item.old.toLocaleString('vi-VN')}</div>
                    </div>
                </div>
            `).join('');
        }

        function searchItem() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('item-card');
            Array.from(cards).forEach(card => {
                let name = card.querySelector('.item-name').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function logicJumping() {
            const spans = document.querySelectorAll('.item-value span');
            const olds = document.querySelectorAll('.item-old');
            spans.forEach((span, i) => {
                if (Math.random() > 0.7) {
                    let current = parseInt(span.innerText.replace(/\./g, ''));
                    olds[i].innerText = "Old: " + current.toLocaleString('vi-VN');
                    let percent = (Math.random() * 0.08) + 0.02;
                    let change = Math.floor(current * percent);
                    let newValue = Math.random() > 0.5 ? current + change : current - change;
                    if (newValue < 100) newValue = 100;
                    if (newValue > 100000) newValue = 100000;
                    span.innerText = newValue.toLocaleString('vi-VN');
                    span.style.color = newValue > current ? "#00ff88" : "#ff2d55";
                    setTimeout(() => span.style.color = "#ffd700", 3000);
                }
            });
        }

        window.onload = () => { renderItems(); logicJumping(); };
    </script>
</body>
</html>
