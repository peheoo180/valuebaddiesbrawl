<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="google-site-verification" content="DWMZ7geS59ohdBDTEw0FKiXWfDGgT6XTrSDWnzcpnSg" />

    <title>Baddies Brawl Value 🌸</title>
    <meta name="description" content="Cập nhật Baddies Brawl Value List chính xác nhất 2026. Công cụ Trade thông minh bởi Peheoo.">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <style>
        :root {
            --bg-dark: #0b0f19;
            --card-bg: #161d2b;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #9ca3af;
            --border-color: rgba(255, 255, 255, 0.05);
            --accent-red: #ff2d55;
            /* Màu độ hiếm */
            --rarity-low: linear-gradient(135deg, #14532d, #166534); /* Xanh lá */
            --rarity-mid: linear-gradient(135deg, #1e40af, #1e3a8a); /* Xanh dương */
            --rarity-high: linear-gradient(135deg, #581c87, #4c1d95); /* Tím */
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* --- BANNER UY TÍN --- */
        .safety-banner {
            background: #1e293b; color: #3b82f6; font-size: 11px;
            text-align: center; padding: 8px; font-weight: bold;
            border-bottom: 1px solid var(--border-color);
        }

        /* --- TRADE SECTION --- */
        .trade-section { display: none; padding: 10px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent-purple); }
        .trade-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .side-title { font-size: 11px; font-weight: 900; text-align: center; margin-bottom: 4px; }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
        .trade-slot { 
            aspect-ratio: 1/1; background: var(--card-bg); border: 1px dashed var(--border-color);
            border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .trade-slot img { width: 85%; height: 85%; object-fit: contain; }
        .side-total { text-align: center; font-size: 10px; font-weight: bold; color: #ffd700; margin-top: 6px; background: #000; padding: 4px; border-radius: 4px; }

        /* --- PICKER MODAL --- */
        #pickerModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 10000; display: none; flex-direction: column; padding: 15px; }
        .picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; overflow-y: auto; }
        .p-card { background: var(--card-bg); border-radius: 8px; padding: 5px; text-align: center; border: 1px solid var(--border-color); }
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; }

        /* --- GIAO DIỆN CHÍNH --- */
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 15, 25, 0.9); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .header h1 { font-size: 18px; margin: 0; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
        
        .search-container { padding: 15px 15px 5px; }
        #searchInput { width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; color: white; outline: none; box-sizing: border-box; }

        .filter-container { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-sub); padding: 8px 15px; border-radius: 50px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent-purple); color: white; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px 15px 30px; }
        .item-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--border-color); transition: 0.2s; }
        
        /* Box chứa ảnh - Sẽ đổi màu theo Value */
        .image-box { 
            width: 100%; aspect-ratio: 1.2 / 1; 
            display: flex; justify-content: center; align-items: center; 
            background: #1e293b; /* Màu mặc định */
        }
        .image-box img { width: 80%; height: 80%; object-fit: contain; }
        
        .info-box { padding: 10px; }
        .tag { font-size: 9px; color: var(--text-sub); text-transform: uppercase; opacity: 0.7; }
        .item-name { font-size: 13px; font-weight: 700; margin: 2px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-value { color: #ffd700; font-weight: 800; font-size: 14px; }
        .item-old { font-size: 10px; color: var(--accent-red); font-weight: 600; }

        /* Các class bổ trợ màu nền */
        .bg-low { background: var(--rarity-low) !important; }
        .bg-mid { background: var(--rarity-mid) !important; }
        .bg-high { background: var(--rarity-high) !important; }
    </style>
</head>
<body>

    <div class="safety-banner">
        🛡️ WEBSITE BẢO MẬT: KHÔNG YÊU CẦU ĐĂNG NHẬP
    </div>

    <div id="pickerModal">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <b>CHỌN VẬT PHẨM</b>
            <button onclick="closePicker()" style="background:none; border:none; color:#fff; font-size:24px;">×</button>
        </div>
        <div class="picker-grid" id="pickerGrid"></div>
    </div>

    <div id="mainContent">
        <div class="header"><h1>BADDIES BRAWL VALUE 🌸</h1><div>☰</div></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm vật phẩm..." onkeyup="filterItems()">
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="setFilter('All', this)">All</button>
            <button class="filter-btn" style="color:var(--accent-red)" onclick="toggleTrade()">TRADE TOOL</button>
            <button class="filter-btn" onclick="setFilter('Style', this)">Style</button>
            <button class="filter-btn" onclick="setFilter('Skin', this)">Skin</button>
            <button class="filter-btn" onclick="setFilter('Aura', this)">Aura</button>
        </div>

        <div class="trade-section" id="tradeSection">
            <div class="trade-wrapper">
                <div>
                    <div class="side-title" style="color:var(--accent-red)">YOU</div>
                    <div class="trade-grid" id="gridYou">
                        <div class="trade-slot" onclick="openPicker('you', 0)">+</div>
                        <div class="trade-slot" onclick="openPicker('you', 1)">+</div>
                        <div class="trade-slot" onclick="openPicker('you', 2)">+</div>
                    </div>
                    <div class="side-total">Value: <span id="totalYou">0</span></div>
                </div>
                <div>
                    <div class="side-title" style="color:#3b82f6">THEM</div>
                    <div class="trade-grid" id="gridThem">
                        <div class="trade-slot" onclick="openPicker('them', 0)">+</div>
                        <div class="trade-slot" onclick="openPicker('them', 1)">+</div>
                        <div class="trade-slot" onclick="openPicker('them', 2)">+</div>
                    </div>
                    <div class="side-total">Value: <span id="totalThem">0</span></div>
                </div>
            </div>
        </div>

        <div class="grid-container" id="itemGrid">
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938958892105739/5d9d7c932f69c220afd5b248c74ba066.png"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Monkey Style</div><div class="item-value">Value: <span>8.500</span></div><div class="item-old">Old: -</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1499015546639745074/1777463502312.png"></div><div class="info-box"><span class="tag">Aura</span><div class="item-name">Bat Aura</div><div class="item-value">Value: <span>50.000</span></div><div class="item-old">Old: -</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498960008392605767/9a223c3b0772c2c0dceba6be69072734_2.png"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Bonk Style</div><div class="item-value">Value: <span>600</span></div><div class="item-old">Old: 1.700</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498947310871122022/b01999b81cc4701dd38d4ba51a8ffc52.png"></div><div class="info-box"><span class="tag">Skin</span><div class="item-name">Arctic</div><div class="item-value">Value: <span>44.560</span></div><div class="item-old">Old: 26.710</div></div></div>
            </div>
    </div>

    <script>
        let listItemsData = [];

        window.onload = function() {
            collectData();
            updateRarityColors();
        };

        function collectData() {
            listItemsData = [];
            document.querySelectorAll('.item-card').forEach(card => {
                listItemsData.push({
                    name: card.querySelector('.item-name').innerText,
                    img: card.querySelector('img').src,
                    val: card.querySelector('.item-value span').innerText,
                    tag: card.querySelector('.tag').innerText
                });
            });
        }

        // --- HÀM TỰ ĐỘNG ĐỔI MÀU NỀN ---
        function updateRarityColors() {
            document.querySelectorAll('.item-card').forEach(card => {
                let val = parseInt(card.querySelector('.item-value span').innerText.replace(/\./g, ''));
                let box = card.querySelector('.image-box');
                
                if (val >= 20000) box.classList.add('bg-high');      // Tím
                else if (val >= 5000) box.classList.add('bg-mid');   // Xanh dương
                else box.classList.add('bg-low');                    // Xanh lá
            });
        }

        function toggleTrade() {
            let s = document.getElementById('tradeSection');
            s.style.display = (s.style.display === 'block' ? 'none' : 'block');
        }

        function openPicker(side, idx) {
            let sideId = side === 'you' ? 'gridYou' : 'gridThem';
            let slot = document.getElementById(sideId).children[idx];
            if(slot.querySelector('img')) {
                slot.innerHTML = '+'; updateTradeTotal(); return;
            }
            document.getElementById('pickerModal').style.display = 'flex';
            let grid = document.getElementById('pickerGrid');
            grid.innerHTML = '';
            listItemsData.forEach(item => {
                let d = document.createElement('div');
                d.className = 'p-card';
                d.innerHTML = `<img src="${item.img}"><div style="font-size:9px">${item.name}</div>`;
                d.onclick = () => {
                    slot.innerHTML = `<img src="${item.img}"><span style="display:none" class="v-val">${item.val}</span>`;
                    updateTradeTotal(); closePicker();
                };
                grid.appendChild(d);
            });
        }

        function updateTradeTotal() {
            ['You', 'Them'].forEach(s => {
                let total = 0;
                document.querySelectorAll(`#grid${s} .v-val`).forEach(v => {
                    total += parseInt(v.innerText.replace(/\./g, ''));
                });
                document.getElementById(`total${s}`).innerText = total.toLocaleString('vi-VN');
            });
        }

        function closePicker() { document.getElementById('pickerModal').style.display = 'none'; }

        function filterItems() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.item-card').forEach(card => {
                let name = card.querySelector('.item-name').innerText.toLowerCase();
                card.style.display = name.includes(input) ? "block" : "none";
            });
        }

        function setFilter(cat, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.item-card').forEach(card => {
                let tag = card.querySelector('.tag').innerText;
                card.style.display = (cat === 'All' || tag === cat) ? "block" : "none";
            });
        }
    </script>
</body>
</html>
