<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baddies Brawl Value 🌸</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #8a99b1;
            --border-color: rgba(255, 255, 255, 0.1);
            --accent-red: #ff2d55;
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* --- TRADE UI (GIỮ STYLE CŨ) --- */
        .trade-section { display: none; padding: 15px; background: rgba(255,255,255,0.03); margin-bottom: 10px; }
        .trade-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .side-title { font-size: 12px; font-weight: 800; text-align: center; margin-bottom: 5px; color: var(--accent-red); }
        .trade-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .trade-slot { 
            aspect-ratio: 1/1; background: var(--card-bg); border-radius: 8px; border: 1px dashed var(--border-color);
            display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer;
        }
        .trade-slot img { width: 90%; height: 90%; object-fit: contain; }
        .add-icon { color: var(--text-sub); font-size: 10px; font-weight: bold; }
        .side-total { text-align: center; font-size: 11px; font-weight: bold; color: #ffd700; margin-top: 5px; background: #000; padding: 3px; border-radius: 4px; }

        /* --- PICKER MODAL --- */
        #pickerModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark); z-index: 10000; display: none;
            flex-direction: column; padding: 20px; box-sizing: border-box;
        }
        .picker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; }
        .p-card { background: var(--card-bg); padding: 5px; border-radius: 10px; text-align: center; border: 1px solid var(--border-color); }
        .p-card img { width: 100%; aspect-ratio: 1/1; object-fit: contain; }
        .p-card div { font-size: 10px; color: #fff; margin-top: 4px; overflow: hidden; white-space: nowrap; }

        /* --- GIAO DIỆN CHÍNH (GIỮ NGUYÊN CODE CŨ CỦA MÀY) --- */
        .header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 10, 24, 0.95); backdrop-filter: blur(15px);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .header h1 { 
            font-size: 18px; margin: 0; font-weight: 800; 
            background: linear-gradient(to right, #ff2d55, #561c94, #00d2ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: rainbow-text 3s linear infinite;
        }
        .search-container { padding: 20px 20px 10px; }
        #searchInput {
            width: 100%; padding: 12px 15px; background: var(--card-bg);
            border: 1px solid var(--border-color); border-radius: 12px;
            color: white; outline: none; box-sizing: border-box;
        }
        .filter-container { display: flex; gap: 10px; padding: 10px 20px; overflow-x: auto; scrollbar-width: none; }
        .filter-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-sub); padding: 8px 18px; border-radius: 50px; font-size: 13px; font-weight: 600; cursor: pointer; }
        .filter-btn.active { background: var(--accent-purple); color: white; }
        .btn-trade-toggle { background: var(--accent-red) !important; color: white !important; border: none !important; }

        .all-items-title { padding: 10px 20px; font-size: 18px; font-weight: 700; color: #ffffff; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 0 15px 30px; }
        .item-card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid var(--border-color); }
        .image-box { width: 100%; aspect-ratio: 1.2 / 1; background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab, #561c94); background-size: 400% 400%; animation: gradient-bg 5s ease infinite; display: flex; justify-content: center; align-items: center; }
        .image-box img { width: 80%; height: 80%; object-fit: contain; }
        .info-box { padding: 12px; }
        .tag { background: rgba(255, 255, 255, 0.08); color: var(--text-sub); font-size: 9px; padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 6px; text-transform: uppercase; }
        .item-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-value span { color: #ffd700; font-weight: 600; }
        .item-old { font-size: 11px; color: #ff2d55; font-weight: 600; }

        @keyframes rainbow-text { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes gradient-bg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <div id="pickerModal">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0">CHỌN ITEM</h3>
            <button onclick="closePicker()" style="background:none; border:none; color:#fff; font-size:25px;">×</button>
        </div>
        <div class="picker-grid" id="pickerGrid"></div>
    </div>

    <div id="mainContent">
        <div class="header"><h1>BADDIES BRAWL VALUE 🌸</h1><div>☰</div></div>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Tìm tên vật phẩm..." onkeyup="filterItems()">
        </div>

        <div class="filter-container">
            <button class="filter-btn active" onclick="setFilter('All', this)">All Items</button>
            <button class="filter-btn btn-trade-toggle" onclick="toggleTrade()">TRADE</button>
            <button class="filter-btn" onclick="setFilter('Style', this)">Style</button>
            <button class="filter-btn" onclick="setFilter('Skin', this)">Skin</button>
            <button class="filter-btn" onclick="setFilter('Aura', this)">Aura</button>
        </div>

        <div class="trade-section" id="tradeSection">
            <div class="trade-container">
                <div>
                    <div class="side-title">YOU</div>
                    <div class="trade-grid" id="gridYou">
                        <div class="trade-slot" onclick="openPicker('you', 0)"><span class="add-icon">+Add</span></div>
                        <div class="trade-slot" onclick="openPicker('you', 1)"><span class="add-icon">+Add</span></div>
                        <div class="trade-slot" onclick="openPicker('you', 2)"><span class="add-icon">+Add</span></div>
                    </div>
                    <div class="side-total">Value: <span id="totalYou">0</span></div>
                </div>
                <div>
                    <div class="side-title" style="color:#00d2ff">THEM</div>
                    <div class="trade-grid" id="gridThem">
                        <div class="trade-slot" onclick="openPicker('them', 0)"><span class="add-icon">+Add</span></div>
                        <div class="trade-slot" onclick="openPicker('them', 1)"><span class="add-icon">+Add</span></div>
                        <div class="trade-slot" onclick="openPicker('them', 2)"><span class="add-icon">+Add</span></div>
                    </div>
                    <div class="side-total">Value: <span id="totalThem">0</span></div>
                </div>
            </div>
        </div>
        
        <div class="all-items-title" id="listTitle">All Items</div>

        <div class="grid-container" id="itemGrid">
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938958892105739/5d9d7c932f69c220afd5b248c74ba066.png?ex=69f2fb30&is=69f1a9b0&hm=89d89a2f486a8686791b0114d16a01431cf78808f110258e417e657b8f72708a&"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Monkey Style</div><div class="item-value">Value: <span>8.500</span></div><div class="item-old">Old: -</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938931008507974/66c6629cb38610dd030654bcb36dced8.png?ex=69f2fb2a&is=69f1a9aa&hm=ba6c6eeb6489ab3eea9d936cccf9e94435d1bc9bf05677c108286eb410fe577b&"></div><div class="info-box"><span class="tag">Style</span><div class="item-name">Princess style</div><div class="item-value">Value: <span>11.000</span></div><div class="item-old">Old: 9.700</div></div></div>
            <div class="item-card"><div class="image-box"><img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498943124041629747/b01999b81cc4701dd38d4ba51a8ffc52_1.png?ex=69f2ff11&is=69f1ad91&hm=88f719d473f495e275495275dc73c57aefd328b7ebec03136011f74838e79313&"></div><div class="info-box"><span class="tag">Skin</span><div class="item-name">EggRose</div><div class="item-value">Value: <span>9.820</span></div><div class="item-old">Old: 6.340</div></div></div>
            </div>
    </div>

    <script>
        let currentSide = '';
        let currentSlotIdx = 0;
        let listItemsData = [];

        window.onload = function() {
            collectData();
            logicJumping();
        };

        // Lấy dữ liệu từ Card để nạp vào Trade
        function collectData() {
            listItemsData = [];
            document.querySelectorAll('.item-card').forEach(card => {
                listItemsData.push({
                    name: card.querySelector('.item-name').innerText,
                    img: card.querySelector('img').src,
                    val: card.querySelector('.item-value span').innerText,
                    tag: card.querySelector('.tag').innerText
                });
            });
        }

        function toggleTrade() {
            let s = document.getElementById('tradeSection');
            s.style.display = (s.style.display === 'block' ? 'none' : 'block');
        }

        function openPicker(side, idx) {
            let slot = document.getElementById(`grid${side.charAt(0).toUpperCase()+side.slice(1)}`).children[idx];
            // Nếu có ảnh rồi thì ấn là XÓA
            if(slot.querySelector('img')) {
                slot.innerHTML = '<span class="add-icon">+Add</span>';
                updateTradeTotal();
                return;
            }
            // Nếu chưa có thì hiện bảng chọn
            currentSide = side;
            currentSlotIdx = idx;
            document.getElementById('pickerModal').style.display = 'flex';
            let grid = document.getElementById('pickerGrid');
            grid.innerHTML = '';
            listItemsData.forEach(item => {
                let d = document.createElement('div');
                d.className = 'p-card';
                d.innerHTML = `<img src="${item.img}"><div>${item.name}</div>`;
                d.onclick = () => selectItem(item);
                grid.appendChild(d);
            });
        }

        function selectItem(item) {
            let sideId = currentSide === 'you' ? 'gridYou' : 'gridThem';
            let slot = document.getElementById(sideId).children[currentSlotIdx];
            slot.innerHTML = `<img src="${item.img}"><span style="display:none" class="v-val">${item.val}</span>`;
            updateTradeTotal();
            closePicker();
        }

        function updateTradeTotal() {
            ['You', 'Them'].forEach(s => {
                let total = 0;
                document.querySelectorAll(`#grid${s} .v-val`).forEach(v => {
                    total += parseInt(v.innerText.replace(/\./g, ''));
                });
                document.getElementById(`total${s}`).innerText = total.toLocaleString('vi-VN');
            });
        }

        function closePicker() { document.getElementById('pickerModal').style.display = 'none'; }

        // MẤY CÁI HÀM CŨ CỦA MÀY GIỮ NGUYÊN 100%
        function setFilter(cat, btn) {
            let buttons = document.getElementsByClassName('filter-btn');
            for(let b of buttons) b.classList.remove('active');
            btn.classList.add('active');
            document.getElementById('listTitle').innerText = cat === 'All' ? 'All Items' : cat + 's';
            let cards = document.getElementsByClassName('item-card');
            for (let i = 0; i < cards.length; i++) {
                let tag = cards[i].querySelector('.tag').innerText;
                cards[i].style.display = (cat === 'All' || tag === cat) ? "block" : "none";
            }
        }

        function filterItems() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('item-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector('.item-name').innerText.toLowerCase();
                cards[i].style.display = name.includes(input) ? "block" : "none";
            }
        }

        function logicJumping() {
            // Logic nhảy giá trị y hệt code cũ của mày
            const cards = document.querySelectorAll('.item-card');
            const savedData = JSON.parse(localStorage.getItem('baddiesValues'));
            if (savedData) {
                cards.forEach((card, i) => {
                    if(savedData[i]) {
                        card.querySelector('.item-value span').innerText = savedData[i].v;
                        card.querySelector('.item-old').innerText = "Old: " + savedData[i].o;
                    }
                });
            }
            collectData(); // Cập nhật lại list cho trade sau khi giá nhảy
        }
    </script>
</body>
</html>
