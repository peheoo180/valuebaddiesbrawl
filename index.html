<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Baddies Brawl</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container { width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #ff3e3e; text-transform: uppercase; }
        .link-btn {
            display: block;
            background: #333;
            color: white;
            padding: 15px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 8px;
            border: 1px solid #444;
            transition: 0.3s;
        }
        .link-btn:hover { background: #ff3e3e; border-color: #fff; }
        .img-display {
            width: 100%;
            margin-top: 20px;
            border: 2px solid #ff3e3e;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Value Baddies Brawl ✨</h1>
        <p>Chào mừng ông đến với trang giá trị vật phẩm!</p>
        
        <a href="https://www.roblox.com/" class="link-btn">Chơi Game Trên Roblox</a>
        <a href="#" class="link-btn">Bảng Giá Vật Phẩm</a>
        <a href="#" class="link-btn">Discord Cộng Đồng</a>

        <img src="https://via.placeholder.com/400x200/ff3e3e/ffffff?text=Baddies+Brawl+Image" class="img-display" alt="Game Image">
    </div>
</body>
</html>
