<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baddies Brawl Value 🌸</title>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #8a99b1;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 10, 24, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 { 
            font-size: 18px; 
            margin: 0; 
            font-weight: 800; 
            background: linear-gradient(to right, #ff2d55, #561c94, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-text 3s linear infinite;
        }

        .section-title {
            padding: 25px 20px 15px;
        }

        .section-title h2 { font-size: 20px; margin: 0; font-weight: 700; color: #fff; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px 30px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease;
        }

        .item-card:active { transform: scale(0.97); }

        .image-box {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            background: linear-gradient(135deg, #561c94, #2a0e4a);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img { 
            width: 80%; 
            height: 80%; 
            object-fit: contain; 
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.2));
        }

        .info-box { padding: 12px; }
        
        .tag {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-sub);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .item-name { font-size: 14px; font-weight: 700; color: #fff; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-value { font-size: 12px; color: var(--text-sub); }
        .item-value span { color: #ffd700; font-weight: 600; }
        .item-old { font-size: 12px; color: #ff2d55; font-weight: 600; margin-top: 2px; }

        @keyframes rainbow-text {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>BADDIES BRAWL VALUE 🌸</h1>
        <div style="color: white;">☰</div>
    </div>

    <div class="section-title">
        <h2>Latest Items</h2>
    </div>

    <div class="grid-container">
        <div class="item-card">
            <div class="image-box">
                <img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938958892105739/5d9d7c932f69c220afd5b248c74ba066.png?ex=69f2fb30&is=69f1a9b0&hm=89d89a2f486a8686791b0114d16a01431cf78808f110258e417e657b8f72708a&" alt="Monkey Style">
            </div>
            <div class="info-box">
                <span class="tag">Style</span>
                <div class="item-name">Monkey Style</div>
                <div class="item-value">Value: <span>8.500</span></div>
                <div class="item-old">Old: -</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box">
                <img src="https://cdn.discordapp.com/attachments/1498938855171031142/1498938931008507974/66c6629cb38610dd030654bcb36dced8.png?ex=69f2fb2a&is=69f1a9aa&hm=ba6c6eeb6489ab3eea9d936cccf9e94435d1bc9bf05677c108286eb410fe577b&" alt="Princess style ">
            </div>
            <div class="info-box">
                <span class="tag">Style</span>
                <div class="item-name">Princess style </div>
                <div class="item-value">Value: <span>11.000</span></div>
                <div class="item-old">Old: 9.700</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box">
                <img src="LINK_ẢNH_3" alt="Item">
            </div>
            <div class="info-box">
                <span class="tag">Stomp</span>
                <div class="item-name">Tên Đồ 3</div>
                <div class="item-value">Value: <span>-</span></div>
                <div class="item-old">Old: -</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box">
                <img src="LINK_ẢNH_4" alt="Item">
            </div>
            <div class="info-box">
                <span class="tag">Sledgehammer</span>
                <div class="item-name">Tên Đồ 4</div>
                <div class="item-value">Value: <span>-</span></div>
                <div class="item-old">Old: -</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box">
                <img src="LINK_ẢNH_5" alt="Item">
            </div>
            <div class="info-box">
                <span class="tag">Accessory</span>
                <div class="item-name">Tên Đồ 5</div>

                <div class="item-old">Old: -</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box">
                <img src="LINK_ẢNH_6" alt="Item">

            <div class="info-box">
                <span class="tag">Item</span>
                <div class="item-name">Tên Đồ 6</div>
                <div class="item-value">Value: <span>-</span></div>
                <div class="item-old">Old: -</div>
            </div>
        </div>
    </div>

</body>
</html>
