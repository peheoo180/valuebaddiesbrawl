<script>
    // HÀM SEARCH GIỮ NGUYÊN
    function searchItem() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('item-card');
        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getElementsByClassName('item-name')[0].innerText.toLowerCase();
            if (name.includes(input)) {
                cards[i].style.display = "block";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // LOGIC RANDOM CHỌN MÓN VÀ NHẢY GIÁ (TỐI ĐA 3 MÓN)
    function logicJumping() {
        const now = new Date().getTime();
        const lastUpdate = localStorage.getItem('lastUpdate');
        const updateInterval = 30 * 60 * 1000; // 30 phút check 1 lần

        const cards = document.querySelectorAll('.item-card');
        
        // 1. Load giá cũ từ bộ nhớ máy (nếu có)
        const savedData = JSON.parse(localStorage.getItem('baddiesValues'));
        if (savedData) {
            cards.forEach((card, i) => {
                if(savedData[i]) {
                    card.querySelector('.item-value span').innerText = savedData[i].v;
                    card.querySelector('.item-old').innerText = "Old: " + savedData[i].o;
                }
            });
        }

        // 2. Kiểm tra thời gian (chống spam F5 liên tục)
        if (lastUpdate && (now - lastUpdate < updateInterval)) return;

        // 3. Quyết định số lượng món sẽ đổi (0, 1, 2, hoặc 3)
        let numToChange = 0;
        let luck = Math.random();
        if (luck > 0.5 && luck <= 0.75) numToChange = 1;      // 25% đổi 1 món
        else if (luck > 0.75 && luck <= 0.92) numToChange = 2; // 17% đổi 2 món
        else if (luck > 0.92) numToChange = 3;                // 8% đổi 3 món
        // Còn lại (50%) là giữ nguyên giá (numToChange = 0)

        // 4. Chọn ngẫu nhiên index của các vật phẩm sẽ được đổi
        let chosenIndices = [];
        if (numToChange > 0) {
            let availableIndices = Array.from(Array(cards.length).keys()); // Tạo mảng [0, 1, 2, ...]
            // Xáo trộn mảng để lấy ngẫu nhiên
            availableIndices.sort(() => Math.random() - 0.5);
            chosenIndices = availableIndices.slice(0, numToChange);
        }

        const newData = [];
        cards.forEach((card, index) => {
            let valSpan = card.querySelector('.item-value span');
            let oldDiv = card.querySelector('.item-old');
            
            let currentValStr = valSpan.innerText.replace(/\./g, '');
            let currentVal = parseInt(currentValStr);
            let oldValText = oldDiv.innerText.replace("Old: ", "");

            if (chosenIndices.includes(index)) {
                // Món này nằm trong danh sách "bị" nhảy giá
                let oldValBackup = currentVal;
                // Nhảy giá từ 1% đến 12%
                let percent = (Math.random() * 0.11) + 0.01; 
                let change = Math.floor(currentVal * percent);
                
                // Tăng hoặc giảm tùy hên xui
                if (Math.random() > 0.5) currentVal += change;
                else currentVal -= change;

                let newValFormatted = currentVal.toLocaleString('vi-VN');
                let oldValFormatted = oldValBackup.toLocaleString('vi-VN');

                valSpan.innerText = newValFormatted;
                oldDiv.innerText = "Old: " + oldValFormatted;
                
                // Hiệu ứng đổi màu tạm thời cho đẹp
                valSpan.style.transition = "color 0.5s";
                valSpan.style.color = (currentVal > oldValBackup) ? "#00ff88" : "#ff2d55";
                setTimeout(() => { valSpan.style.color = "#ffd700"; }, 5000);

                newData.push({ v: newValFormatted, o: oldValFormatted });
            } else {
                // Giữ nguyên giá
                newData.push({ v: valSpan.innerText, o: oldValText });
            }
        });

        // 5. Lưu lại để lần sau F5 không bị đổi tiếp
        localStorage.setItem('baddiesValues', JSON.stringify(newData));
        localStorage.setItem('lastUpdate', now);
    }

    window.onload = logicJumping;
</script>
