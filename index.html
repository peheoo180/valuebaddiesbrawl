<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baddies Brawl Value 🌸</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-dark: #050a18;
            --card-bg: #0d162d;
            --accent-purple: #561c94;
            --text-main: #ffffff;
            --text-sub: #8a99b1;
        }

        /* Vuốt mượt như Facebook/TikTok */
        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        /* Header xịn với chữ Baddies Brawl Value */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(5, 10, 24, 0.95);
            backdrop-filter: blur(15px);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header h1 { 
            font-size: 18px; 
            margin: 0; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            background: linear-gradient(to right, #ff2d55, #561c94, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow-text 3s linear infinite;
        }

        .section-title {
            padding: 25px 20px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title h2 { font-size: 20px; margin: 0; font-weight: 700; color: #fff; }
        .view-all { color: var(--text-sub); font-size: 12px; text-decoration: none; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px 20px;
        }

        .item-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            border: 2px solid transparent;
            animation: rainbow-border 4s linear infinite;
            transition: transform 0.2s ease;
            touch-action: pan-y;
        }

        .item-card:active { transform: scale(0.96); }

        .image-box {
            width: 100%;
            aspect-ratio: 1.2 / 1;
            background: linear-gradient(135deg, #561c94, #2a0e4a);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-box img { width: 80%; height: 80%; object-fit: contain; }

        .info-box { padding: 12px; }
        
        .tag {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-sub);
            font-size: 9px;
            padding: 2px 8px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .item-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .item-value { font-size: 12px; color: var(--text-sub); }
        .item-value span { color: #ffd700; font-weight: 600; }
        .item-old { font-size: 12px; color: #ff2d55; font-weight: 600; margin-top: 2px; }

        @keyframes rainbow-border {
            0% { border-color: #ff0000; }
            33% { border-color: #00ff00; }
            66% { border-color: #00d2ff; }
            100% { border-color: #ff0000; }
        }

        @keyframes rainbow-text {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .sortable-ghost { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BADDIES BRAWL VALUE 🌸</h1>
        <div style="color: white;">☰</div>
    </div>

    <div class="section-title">
        <h2>Latest Weapons</h2>
        <a href="#" class="view-all">View All ></a>
    </div>

    <div class="grid-container draggable-zone">
        <div class="item-card">
            <div class="image-box">
                <img src="https://via.placeholder.com/150?text=Weapon" alt="Weapon">
            </div>
            <div class="info-box">
                <span class="tag">Sword</span>
                <div class="item-name">Sakura Sword</div>
                <div class="item-value">Value: <span>1,000</span></div>
                <div class="item-old">Old: 800</div>
            </div>
        </div>

        <div class="item-card">
            <div class="image-box" style="background: linear-gradient(45deg, #ff3e3e, #ffb800, #561c94);">
                <img src="https://via.placeholder.com/150?text=Monkey" alt="Monkey">
            </div>
            <div class="info-box">
                <span class="tag">Style</span>
                <div class="item-name">Monkey Style</div>
                <div class="item-value">Value: <span>1,500</span></div>
                <div class="item-old">Old: 1,200</div>
            </div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.draggable-zone').forEach(zone => {
            new Sortable(zone, {
                animation: 150,
                delay: 150,
                delayOnTouchOnly: true,
                ghostClass: 'sortable-ghost'
            });
        });
    </script>

</body>
</html>
